services:
  fluent-bit:
    image: ${FLUENT_BIT_IMAGE:-fluent/fluent-bit:4.0}
    restart: unless-stopped
    command: ["/fluent-bit/bin/fluent-bit", "-c", "/fluent-bit/etc/fluent-bit.conf"]
    environment:
      COLLECTOR_NAME: ${COLLECTOR_NAME:-net-sec-watch-fluent-bit}
      SITE_NAME: ${SITE_NAME:-default}
    ports:
      - "${FLUENT_BIT_HTTP_BIND:-127.0.0.1}:${FLUENT_BIT_HTTP_PORT:-2020}:2020"
      - "${SYSLOG_BIND:-0.0.0.0}:${SYSLOG_UDP_PORT:-514}:5514/udp"
      - "${SYSLOG_BIND:-0.0.0.0}:${SYSLOG_TCP_PORT:-514}:5514/tcp"
      - "${SYSLOG_BIND:-0.0.0.0}:${SYSLOG_TLS_PORT:-6514}:6514/tcp"
    volumes:
      - ${FLUENT_BIT_CONFIG_PATH:-./config/fluent-bit.conf}:/fluent-bit/etc/fluent-bit.conf:ro
      - ./config/fluent-bit.conf:/fluent-bit/etc/fluent-bit.base.conf:ro
      - ./config/parsers-custom.conf:/fluent-bit/etc/parsers-custom.conf:ro
      - ./config/scripts:/fluent-bit/etc/scripts:ro
      - ${TLS_CERT_DIR:-./config/tls}:/fluent-bit/etc/tls:ro
      - ./examples/logs:/logs:ro
      - ${HOST_LOG_ROOT:-./examples/logs/system}:/host/var/log:ro
      - ${CONTAINER_LOG_ROOT:-./examples/logs/containers}:/host/var/lib/docker/containers:ro
      - ${ZEEK_LOG_VOLUME:-zeek-logs}:/zeek/logs:ro
      - ${SURICATA_LOG_VOLUME:-suricata-logs}:/suricata/logs:ro
      - fluent-bit-state:/fluent-bit/state

  opensearch:
    image: ${OPENSEARCH_IMAGE:-opensearchproject/opensearch:3.7.0}
    profiles: ["opensearch"]
    restart: unless-stopped
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      path.repo: /usr/share/opensearch/snapshots
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
    ports:
      - "${OPENSEARCH_HTTP_BIND:-127.0.0.1}:${OPENSEARCH_HTTP_PORT:-9200}:9200"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl --fail --silent
          http://127.0.0.1:9200/_cluster/health
          >/dev/null
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
      - opensearch-snapshots:/usr/share/opensearch/snapshots
    depends_on:
      opensearch-snapshot-init:
        condition: service_completed_successfully

  opensearch-snapshot-init:
    image: ${OPENSEARCH_IMAGE:-opensearchproject/opensearch:3.7.0}
    profiles: ["opensearch"]
    user: "0"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        chown -R 1000:1000 /usr/share/opensearch/snapshots
    restart: "no"
    volumes:
      - opensearch-snapshots:/usr/share/opensearch/snapshots

  opensearch-dashboards:
    image: ${OPENSEARCH_DASHBOARDS_IMAGE:-opensearchproject/opensearch-dashboards:3.7.0}
    profiles: ["opensearch"]
    restart: unless-stopped
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "${OPENSEARCH_DASHBOARDS_BIND:-127.0.0.1}:${OPENSEARCH_DASHBOARDS_PORT:-5601}:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  zeek:
    image: ${ZEEK_IMAGE:-zeek/zeek:lts}
    profiles: ["zeek"]
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    command:
      - zeek
      - -i
      - ${ZEEK_INTERFACE:-eth0}
      - -C
      - LogAscii::use_json=T
    working_dir: /zeek/logs
    volumes:
      - ${ZEEK_LOG_VOLUME:-zeek-logs}:/zeek/logs

  suricata:
    image: ${SURICATA_IMAGE:-jasonish/suricata:8.0.5}
    profiles: ["suricata"]
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    command:
      - -i
      - ${SURICATA_INTERFACE:-eth0}
      - --set
      - outputs.1.eve-log.community-id=true
    volumes:
      - ${SURICATA_LOG_VOLUME:-suricata-logs}:/var/log/suricata
      - suricata-rules:/var/lib/suricata

  suricata-update:
    image: ${SURICATA_IMAGE:-jasonish/suricata:8.0.5}
    profiles: ["tools"]
    entrypoint: ["suricata-update"]
    command: ["--no-reload", "--fail"]
    volumes:
      - suricata-rules:/var/lib/suricata

  audit-runtime-sbom:
    image: ${SYFT_IMAGE:-anchore/syft:v1.45.1}
    profiles: ["audit"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - ${AUDIT_TARGET_IMAGE:-fluent/fluent-bit:4.0}
      - --output
      - spdx-json

  audit-source-sbom:
    image: ${SYFT_IMAGE:-anchore/syft:v1.45.1}
    profiles: ["audit"]
    volumes:
      - ./:/source:ro
    command:
      - dir:/source
      - --source-name
      - net-sec-watch
      - --source-version
      - ${AUDIT_SOURCE_VERSION:-working-tree}
      - --exclude
      - ./security/audits/**
      - --output
      - spdx-json

  audit-vulnerabilities:
    image: ${GRYPE_IMAGE:-anchore/grype:v0.114.0}
    profiles: ["audit"]
    volumes:
      - ./security/audits:/audit:ro
      - grype-db:/root/.cache/grype
    command: ["version"]

volumes:
  fluent-bit-state:
  opensearch-data:
  opensearch-snapshots:
  grype-db:
  zeek-logs:
  suricata-logs:
  suricata-rules:
