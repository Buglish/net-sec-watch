[PARSER]
    Name        application_json
    Format      json

# Timestamp normalization is deliberately handled by
# canonical_normalization.lua. The source accepts valid ISO 8601 timestamps
# with or without fractional seconds and with Z, +HHMM, or +HH:MM offsets.

[MULTILINE_PARSER]
    Name          java_stacktrace
    Type          regex
    Flush_Timeout 1000
    Rule          "start_state" "/^[0-9]{4}-[0-9]{2}-[0-9]{2}[ T][0-9]{2}:[0-9]{2}:[0-9]{2}/" "continuation"
    Rule          "continuation" "/^(\\s+at\\s+|Caused by:|\\s*\\.\\.\\. [0-9]+ more|[A-Za-z_$][A-Za-z0-9_$.]*(Exception|Error)(:.*)?)$/" "continuation"
