[SERVICE]
    Flush                     1
    Grace                     30
    Log_Level                 info
    Parsers_File              /fluent-bit/etc/parsers.conf
    Parsers_File              /fluent-bit/etc/parsers-custom.conf
    storage.path              /fluent-bit/state
    storage.sync              normal
    storage.checksum          on
    storage.backlog.mem_limit 10M
    HTTP_Server               on
    HTTP_Listen               0.0.0.0
    HTTP_Port                 2020

# Plain text files and multiline stack traces.
[INPUT]
    Name              tail
    Tag               file.text
    Path              /logs/text/*.log
    Path_Key          log.file.path
    DB                /fluent-bit/state/text-files.db
    DB.Sync           normal
    Read_from_Head    true
    Refresh_Interval  2
    Rotate_Wait       10
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    Mem_Buf_Limit     20M
    storage.type      filesystem
    Multiline.Parser  java_stacktrace

# Structured application logs.
[INPUT]
    Name              tail
    Tag               file.application
    Path              /logs/app/*.json.log
    Path_Key          log.file.path
    Parser            application_json
    DB                /fluent-bit/state/application-files.db
    DB.Sync           normal
    Read_from_Head    true
    Refresh_Interval  2
    Rotate_Wait       10
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    Mem_Buf_Limit     20M
    storage.type      filesystem

# Linux operating-system logs. HOST_LOG_ROOT can point to /var/log.
[INPUT]
    Name              tail
    Tag               host.system
    Path              /host/var/log/syslog,/host/var/log/messages,/host/var/log/auth.log
    Path_Key          log.file.path
    DB                /fluent-bit/state/system-files.db
    DB.Sync           normal
    Read_from_Head    true
    Refresh_Interval  2
    Rotate_Wait       10
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    Mem_Buf_Limit     20M
    storage.type      filesystem

# Docker JSON log files. CONTAINER_LOG_ROOT can point to
# /var/lib/docker/containers.
[INPUT]
    Name              tail
    Tag               container.docker
    Path              /host/var/lib/docker/containers/*/*.log
    Path_Key          log.file.path
    Parser            docker
    DB                /fluent-bit/state/container-files.db
    DB.Sync           normal
    Read_from_Head    true
    Refresh_Interval  2
    Rotate_Wait       10
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    Mem_Buf_Limit     20M
    storage.type      filesystem

# Objective 1 stops at reliable collection. Stdout provides an observable,
# dependency-free verification target. OpenSearch output follows in Objective 3.
[OUTPUT]
    Name   stdout
    Match  *
    Format json_lines
