[SERVICE]
    Flush                     1
    Grace                     30
    Log_Level                 info
    Parsers_File              /fluent-bit/etc/parsers.conf
    Parsers_File              /fluent-bit/etc/parsers-custom.conf
    storage.path              /fluent-bit/state
    storage.sync              normal
    storage.checksum          on
    storage.backlog.mem_limit 10M
    HTTP_Server               on
    HTTP_Listen               0.0.0.0
    HTTP_Port                 2020

# Plain text files and multiline stack traces.
[INPUT]
    Name              tail
    Tag               file.text
    Path              /logs/text/*.log
    Path_Key          log.file.path
    DB                /fluent-bit/state/text-files.db
    DB.Sync           normal
    Read_from_Head    true
    Refresh_Interval  2
    Rotate_Wait       10
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    Mem_Buf_Limit     20M
    storage.type      filesystem
    Multiline.Parser  java_stacktrace

# Structured application logs.
[INPUT]
    Name              tail
    Tag               file.application
    Path              /logs/app/*.json.log
    Path_Key          log.file.path
    Parser            application_json
    DB                /fluent-bit/state/application-files.db
    DB.Sync           normal
    Read_from_Head    true
    Refresh_Interval  2
    Rotate_Wait       10
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    Mem_Buf_Limit     20M
    storage.type      filesystem

# Linux operating-system logs. HOST_LOG_ROOT can point to /var/log.
[INPUT]
    Name              tail
    Tag               host.system
    Path              /host/var/log/syslog,/host/var/log/messages,/host/var/log/auth.log
    Path_Key          log.file.path
    DB                /fluent-bit/state/system-files.db
    DB.Sync           normal
    Read_from_Head    true
    Refresh_Interval  2
    Rotate_Wait       10
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    Mem_Buf_Limit     20M
    storage.type      filesystem

# Docker JSON log files. CONTAINER_LOG_ROOT can point to
# /var/lib/docker/containers.
[INPUT]
    Name              tail
    Tag               container.docker
    Path              /host/var/lib/docker/containers/*/*.log
    Path_Key          log.file.path
    Parser            docker
    DB                /fluent-bit/state/container-files.db
    DB.Sync           normal
    Read_from_Head    true
    Refresh_Interval  2
    Rotate_Wait       10
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    Mem_Buf_Limit     20M
    storage.type      filesystem

# Zeek JSON network-metadata logs. The optional Zeek Compose profile writes
# here; ZEEK_LOG_ROOT can instead point at logs from a separate sensor host.
[INPUT]
    Name              tail
    Tag               sensor.zeek
    Path              /zeek/logs/*.log
    Path_Key          log.file.path
    Parser            json
    DB                /fluent-bit/state/zeek-files.db
    DB.Sync           normal
    Read_from_Head    true
    Refresh_Interval  2
    Rotate_Wait       10
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    Mem_Buf_Limit     50M
    storage.type      filesystem

[FILTER]
    Name    lua
    Match   sensor.zeek
    script  /fluent-bit/etc/scripts/zeek_metadata.lua
    call    enrich_zeek

# Suricata EVE JSON events from the optional passive IDS/flow sensor.
[INPUT]
    Name              tail
    Tag               sensor.suricata
    Path              /suricata/logs/eve.json
    Path_Key          log.file.path
    Parser            json
    DB                /fluent-bit/state/suricata-files.db
    DB.Sync           normal
    Read_from_Head    true
    Refresh_Interval  2
    Rotate_Wait       10
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    Mem_Buf_Limit     50M
    storage.type      filesystem

[FILTER]
    Name    lua
    Match   sensor.suricata
    script  /fluent-bit/etc/scripts/suricata_metadata.lua
    call    enrich_suricata

# Apply the shared network-event schema after source-specific enrichment.
[FILTER]
    Name    lua
    Match   sensor.*
    script  /fluent-bit/etc/scripts/network_normalization.lua
    call    normalize_network_event

# Network device and syslog collection. UDP and plain TCP receive RFC 3164.
# TLS reception (RFC 5424) is configured in fluent-bit.local.conf.
[INPUT]
    Name               syslog
    Mode               udp
    Listen             0.0.0.0
    Port               5514
    Parser             syslog-rfc3164
    Tag                net.syslog.input.udp
    Source_Address_Key net.src_ip
    storage.type       filesystem
    Mem_Buf_Limit      20M

[INPUT]
    Name               syslog
    Mode               tcp
    Listen             0.0.0.0
    Port               5514
    Parser             syslog-rfc3164
    Tag                net.syslog.input.tcp
    Source_Address_Key net.src_ip
    storage.type       filesystem
    Mem_Buf_Limit      20M

# Record the transport protocol for each syslog event.
[FILTER]
    Name    record_modifier
    Match   net.syslog.input.udp
    Record  net.transport  udp

[FILTER]
    Name    record_modifier
    Match   net.syslog.input.tcp
    Record  net.transport  tcp

# Route malformed records (missing host or unparsed raw data) to dead-letter.
# Rule 1: well-formed record (host present) — keep original tag.
# Rule 2: raw fallback (log key present) — dead-letter.
# Rule 3: parsed but empty/missing host (pri present) — dead-letter.
[FILTER]
    Name         rewrite_tag
    Match        net.syslog.input.udp
    Rule         $host  \S+  net.syslog.udp          false
    Rule         $log   .*   net.syslog.deadletter    false
    Rule         $pri   .+   net.syslog.deadletter    false
    Emitter_Name syslog_udp_router

[FILTER]
    Name         rewrite_tag
    Match        net.syslog.input.tcp
    Rule         $host  \S+  net.syslog.tcp          false
    Rule         $log   .*   net.syslog.deadletter    false
    Rule         $pri   .+   net.syslog.deadletter    false
    Emitter_Name syslog_tcp_router

# Mark dead-letter records for downstream identification.
[FILTER]
    Name    record_modifier
    Match   net.syslog.deadletter
    Record  _dead_letter  true

# Enrich well-formed syslog records: split PRI into facility/severity,
# add reception timestamp, and reconstruct the raw syslog line.
[FILTER]
    Name    lua
    Match   net.syslog.udp
    script  /fluent-bit/etc/scripts/syslog_metadata.lua
    call    enrich_syslog

[FILTER]
    Name    lua
    Match   net.syslog.tcp
    script  /fluent-bit/etc/scripts/syslog_metadata.lua
    call    enrich_syslog

[FILTER]
    Name    lua
    Match   net.syslog.udp
    script  /fluent-bit/etc/scripts/network_normalization.lua
    call    normalize_network_event

[FILTER]
    Name    lua
    Match   net.syslog.tcp
    script  /fluent-bit/etc/scripts/network_normalization.lua
    call    normalize_network_event

# Objective 1 stops at reliable collection. Stdout provides an observable,
# dependency-free verification target. OpenSearch output follows in Objective 3.
[OUTPUT]
    Name   stdout
    Match  *
    Format json_lines
