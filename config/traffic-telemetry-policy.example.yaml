# Copy to config/traffic-telemetry-policy.yaml and complete every value before
# enabling high-volume Zeek or Suricata collection.
policy:
  owner: "replace-with-team-or-person"
  approved_by: "replace-with-approver"
  review_date: "YYYY-MM-DD"
  environment: "development"
  status: "draft"

scope:
  sensor_name: "replace-with-sensor-name"
  sensor_type: "zeek-or-suricata"
  capture_method: "span-tap-or-gateway"
  monitored_networks:
    - "192.0.2.0/24"
  excluded_networks:
    - "replace-with-excluded-network-or-none"
  payload_capture_enabled: false
  tls_decryption_enabled: false

privacy:
  classification: "confidential"
  contains_ip_addresses: true
  contains_dns_names: true
  contains_urls: true
  contains_user_identifiers: "possible"
  redaction_required: true
  approved_users:
    - "replace-with-role"

retention_days:
  ids_alerts: 90
  connection_flows: 30
  dns: 30
  http_metadata: 14
  tls_metadata: 30
  dhcp: 30
  sensor_health: 30
  raw_packet_capture: 0

capacity:
  measured_sample_hours: 0
  measured_bytes: 0
  estimated_daily_bytes: 0
  peak_events_per_second: 0
  growth_percent: 25
  replica_count: 1
  free_storage_bytes: 0

loss_monitoring:
  maximum_capture_drop_percent: 1
  maximum_pipeline_drop_percent: 0
  alert_after_minutes: 5
  zeek_capture_loss_monitored: true
  suricata_capture_kernel_drops_monitored: true
  fluent_bit_retries_and_drops_monitored: true

approval:
  privacy_review_complete: false
  capacity_review_complete: false
  retention_review_complete: false
  security_review_complete: false
  test_capture_complete: false
