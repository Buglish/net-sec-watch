[SERVICE]
    Flush       1
    Grace       5
    Log_Level   info
    Parsers_File /fluent-bit/etc/parsers.conf

[INPUT]
    Name               syslog
    Mode               udp
    Listen             0.0.0.0
    Port               5514
    Parser             syslog-rfc3164
    Tag                failover.syslog.udp
    Source_Address_Key net.src_ip

[INPUT]
    Name               syslog
    Mode               tcp
    Listen             0.0.0.0
    Port               5514
    Parser             syslog-rfc3164
    Tag                failover.syslog.tcp
    Source_Address_Key net.src_ip

[OUTPUT]
    Name   stdout
    Match  *
    Format json_lines
