services:
  collector:
    image: ${FLUENT_BIT_IMAGE:-fluent/fluent-bit:4.0}
    command: ["/fluent-bit/bin/fluent-bit", "-c", "/fluent-bit/etc/collector.conf"]
    depends_on:
      - receiver
    ports:
      - "15514:5514/udp"
      - "15514:5514/tcp"
    volumes:
      - ./config/collector.conf:/fluent-bit/etc/collector.conf:ro
      - ../../config/parsers-custom.conf:/fluent-bit/etc/parsers-custom.conf:ro
      - ../../config/scripts:/fluent-bit/etc/scripts:ro
      - ../runtime/logs:/logs:ro
      - collector-state:/fluent-bit/state

  receiver:
    image: ${FLUENT_BIT_IMAGE:-fluent/fluent-bit:4.0}
    command: ["/fluent-bit/bin/fluent-bit", "-c", "/fluent-bit/etc/receiver.conf"]
    volumes:
      - ./config/receiver.conf:/fluent-bit/etc/receiver.conf:ro

volumes:
  collector-state:
