[SERVICE]
    Flush                     1
    Grace                     30
    Log_Level                 info
    Parsers_File              /fluent-bit/etc/parsers.conf
    Parsers_File              /fluent-bit/etc/parsers-custom.conf
    storage.path              /fluent-bit/state
    storage.sync              normal
    storage.checksum          on
    storage.backlog.mem_limit 10M

[INPUT]
    Name              tail
    Tag               test.text
    Path              /logs/text/*.log
    Path_Key          log.file.path
    DB                /fluent-bit/state/text-files.db
    DB.Sync           full
    Read_from_Head    true
    Refresh_Interval  1
    Rotate_Wait       5
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    storage.type      filesystem
    Multiline.Parser  java_stacktrace

[INPUT]
    Name              tail
    Tag               test.application
    Path              /logs/app/*.json.log
    Path_Key          log.file.path
    Parser            application_json
    DB                /fluent-bit/state/application-files.db
    DB.Sync           full
    Read_from_Head    true
    Refresh_Interval  1
    Rotate_Wait       5
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    storage.type      filesystem

[INPUT]
    Name              tail
    Tag               test.system
    Path              /logs/system/syslog,/logs/system/messages,/logs/system/auth.log
    Path_Key          log.file.path
    DB                /fluent-bit/state/system-files.db
    DB.Sync           full
    Read_from_Head    true
    Refresh_Interval  1
    Rotate_Wait       5
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    storage.type      filesystem

[INPUT]
    Name              tail
    Tag               test.container
    Path              /logs/containers/*/*.log
    Path_Key          log.file.path
    Parser            docker
    DB                /fluent-bit/state/container-files.db
    DB.Sync           full
    Read_from_Head    true
    Refresh_Interval  1
    Rotate_Wait       5
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    storage.type      filesystem

[INPUT]
    Name              tail
    Tag               sensor.zeek
    Path              /logs/zeek/*.log
    Path_Key          log.file.path
    Parser            json
    DB                /fluent-bit/state/zeek-files.db
    DB.Sync           full
    Read_from_Head    true
    Refresh_Interval  1
    Rotate_Wait       5
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    storage.type      filesystem
    Mem_Buf_Limit     10M

[FILTER]
    Name    lua
    Match   sensor.zeek
    script  /fluent-bit/etc/scripts/zeek_metadata.lua
    call    enrich_zeek

[INPUT]
    Name              tail
    Tag               sensor.suricata
    Path              /logs/suricata/eve.json
    Path_Key          log.file.path
    Parser            json
    DB                /fluent-bit/state/suricata-files.db
    DB.Sync           full
    Read_from_Head    true
    Refresh_Interval  1
    Rotate_Wait       5
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    storage.type      filesystem
    Mem_Buf_Limit     10M

[FILTER]
    Name    lua
    Match   sensor.suricata
    script  /fluent-bit/etc/scripts/suricata_metadata.lua
    call    enrich_suricata

[FILTER]
    Name    lua
    Match   sensor.*
    script  /fluent-bit/etc/scripts/network_normalization.lua
    call    normalize_network_event

[INPUT]
    Name               syslog
    Mode               udp
    Listen             0.0.0.0
    Port               5514
    Parser             syslog-rfc3164
    Tag                net.syslog.input.udp
    Source_Address_Key net.src_ip
    storage.type       filesystem
    Mem_Buf_Limit      5M

[INPUT]
    Name               syslog
    Mode               tcp
    Listen             0.0.0.0
    Port               5514
    Parser             syslog-rfc3164
    Tag                net.syslog.input.tcp
    Source_Address_Key net.src_ip
    storage.type       filesystem
    Mem_Buf_Limit      5M

[FILTER]
    Name    record_modifier
    Match   net.syslog.input.udp
    Record  net.transport  udp

[FILTER]
    Name    record_modifier
    Match   net.syslog.input.tcp
    Record  net.transport  tcp

[FILTER]
    Name         rewrite_tag
    Match        net.syslog.input.udp
    Rule         $host  \S+  net.syslog.udp          false
    Rule         $log   .*   net.syslog.deadletter    false
    Rule         $pri   .+   net.syslog.deadletter    false
    Emitter_Name syslog_udp_router

[FILTER]
    Name         rewrite_tag
    Match        net.syslog.input.tcp
    Rule         $host  \S+  net.syslog.tcp          false
    Rule         $log   .*   net.syslog.deadletter    false
    Rule         $pri   .+   net.syslog.deadletter    false
    Emitter_Name syslog_tcp_router

[FILTER]
    Name    record_modifier
    Match   net.syslog.deadletter
    Record  _dead_letter  true

[FILTER]
    Name    lua
    Match   net.syslog.udp
    script  /fluent-bit/etc/scripts/syslog_metadata.lua
    call    enrich_syslog

[FILTER]
    Name    lua
    Match   net.syslog.tcp
    script  /fluent-bit/etc/scripts/syslog_metadata.lua
    call    enrich_syslog

[FILTER]
    Name    lua
    Match   net.syslog.udp
    script  /fluent-bit/etc/scripts/network_normalization.lua
    call    normalize_network_event

[FILTER]
    Name    lua
    Match   net.syslog.tcp
    script  /fluent-bit/etc/scripts/network_normalization.lua
    call    normalize_network_event

[OUTPUT]
    Name                     forward
    Match                    *
    Host                     receiver
    Port                     24224
    Retry_Limit              False
    storage.total_limit_size 50M
