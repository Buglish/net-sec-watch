[SERVICE]
    Flush                     1
    Grace                     30
    Log_Level                 info
    Parsers_File              /fluent-bit/etc/parsers.conf
    Parsers_File              /fluent-bit/etc/parsers-custom.conf
    storage.path              /fluent-bit/state
    storage.sync              normal
    storage.checksum          on
    storage.backlog.mem_limit 10M

[INPUT]
    Name              tail
    Tag               test.text
    Path              /logs/text/*.log
    Path_Key          log.file.path
    DB                /fluent-bit/state/text-files.db
    DB.Sync           full
    Read_from_Head    true
    Refresh_Interval  1
    Rotate_Wait       5
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    storage.type      filesystem
    Multiline.Parser  java_stacktrace

[INPUT]
    Name              tail
    Tag               test.application
    Path              /logs/app/*.json.log
    Path_Key          log.file.path
    Parser            application_json
    DB                /fluent-bit/state/application-files.db
    DB.Sync           full
    Read_from_Head    true
    Refresh_Interval  1
    Rotate_Wait       5
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    storage.type      filesystem

[INPUT]
    Name              tail
    Tag               test.system
    Path              /logs/system/syslog,/logs/system/messages,/logs/system/auth.log
    Path_Key          log.file.path
    DB                /fluent-bit/state/system-files.db
    DB.Sync           full
    Read_from_Head    true
    Refresh_Interval  1
    Rotate_Wait       5
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    storage.type      filesystem

[INPUT]
    Name              tail
    Tag               test.container
    Path              /logs/containers/*/*.log
    Path_Key          log.file.path
    Parser            docker
    DB                /fluent-bit/state/container-files.db
    DB.Sync           full
    Read_from_Head    true
    Refresh_Interval  1
    Rotate_Wait       5
    Skip_Long_Lines   on
    Skip_Empty_Lines  on
    storage.type      filesystem

[OUTPUT]
    Name                     forward
    Match                    *
    Host                     receiver
    Port                     24224
    Retry_Limit              False
    storage.total_limit_size 50M
