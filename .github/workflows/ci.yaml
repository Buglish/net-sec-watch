name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  foundation:
    name: Foundation and static checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck
          python -m pip install --disable-pip-version-check yamllint

      - name: Initialize local example configuration
        run: make init

      - name: Run repository checks
        run: make check

      - name: Scan committed content for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  phase-1:
    name: Phase 1 collector tests
    runs-on: ubuntu-latest
    needs: foundation
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize local example configuration
        run: make init

      - name: Run production Compose smoke test
        run: make test-smoke

      - name: Run collection integration tests
        run: make test-integration

      - name: Run redundant receiver and failover tests
        run: make test-failover
